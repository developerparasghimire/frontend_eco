{% extends "emails/base_email.html" %}
{% block content %}
<h1 style="margin:0 0 12px;font-size:20px;color:#b91c1c;">Low stock alert</h1>
<p style="margin:0 0 12px;color:#475569;">
  The following product is running low and may go out of stock soon:
</p>
<table role="presentation" style="background:#fef2f2;border-radius:10px;padding:14px;width:100%;">
  <tr><td><strong>{{ product.name }}</strong></td></tr>
  <tr><td style="color:#64748b;font-size:12px;">SKU {{ product.sku }}</td></tr>
  <tr><td style="padding-top:8px;">Remaining stock: <strong>{{ product.stock }}</strong></td></tr>
</table>
{% endblock %}
